# ═══════════════════════════════════════════════════════════════════
# 台美股日監測 Agent Pro v3.1 — GitHub Actions 每日自動更新
# 排程：盤前 08:30 / 盤後 17:00 / 美股盤後 05:30 (台灣時間)
# ═══════════════════════════════════════════════════════════════════

name: "📊 台股美股資料每日更新"

on:
  schedule:
    - cron: "30 0 * * 1-5"   # 台灣 08:30 盤前
    - cron: "0 9 * * 1-5"    # 台灣 17:00 盤後
    - cron: "30 21 * * 1-5"  # 台灣 05:30 美股盤後
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: 📦 Install dependencies
        run: |
          cd backend
          npm install
      
      - name: 🚀 Fetch all stock data
        run: |
          cd backend
          node run-update.js
        env:
          TZ: "Asia/Taipei"
      
      - name: 📁 Copy data to frontend
        run: |
          mkdir -p frontend/data
          cp backend/output/*.json frontend/data/
          
          cd frontend/data
          echo '{"files":' > index.json
          ls -1 *.json | grep -v index.json | jq -R . | jq -s . >> index.json
          echo '}' >> index.json
      
      - name: 📤 Commit & Push
        run: |
          git config user.name "TWStock Bot"
          git config user.email "bot@twstock-agent.dev"
          git add -A
          git diff --staged --quiet || git commit -m "📊 update data $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          git push
