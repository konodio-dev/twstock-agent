name: "台股美股資料每日更新"

on:
  schedule:
    # 台股盤前 08:30 台灣 = UTC 00:30
    - cron: "30 0 * * 1-5"
    # 台股盤後 17:00 台灣 = UTC 09:00
    - cron: "0 9 * * 1-5"
    # 美股盤後 05:30 台灣 = UTC 21:30 (前一天)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: cd backend && npm install

      - name: Fetch data
        run: cd backend && node run-update.js
        env:
          TZ: "Asia/Taipei"

      - name: Copy to frontend
        run: |
          mkdir -p frontend/data
          cp backend/output/*.json frontend/data/ 2>/dev/null || true

      - name: Commit and Push
        run: |
          git config user.name "TWStock Bot"
          git config user.email "bot@twstock-agent.dev"
          git add -A
          git diff --staged --quiet || git commit -m "update data"
          git push
