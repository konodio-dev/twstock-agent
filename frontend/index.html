                e("span",null,"獲利 ",e("strong",{style:{color:C.up}},ipo.profit_est)),
                e("span",null,"抽籤 ",e("strong",{style:{color:C.text}},ipo.draw_date)),
                e("span",null,"掛牌 ",e("strong",{style:{color:C.text}},ipo.listing_date))
              ),
              e("div",{style:{marginTop:8,padding:"6px 10px",background:C.warnDim,borderRadius:6,fontSize:11,color:C.warn}},"⚠️ "+ipo.risk)
            ),
            e("div",{style:{textAlign:"right",minWidth:80}},e("div",{style:{fontSize:28,fontWeight:900,color:C.up,fontFamily:MONO}},ipo.profit_est),e("div",{style:{fontSize:10,color:C.textMuted}},"預估報酬"))
          )
        )
      })
    ),

    // ── NEWS ──
    tab==="news"&&e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        ["全部","個股","AI","總經","法人","產業","IPO","國際","匯率"].map(function(c){return e("button",{key:c,onClick:function(){setNewsFilter(c)},style:{padding:"5px 12px",borderRadius:16,background:newsFilter===c?C.accent:C.card,color:newsFilter===c?"#000":C.textDim,border:"1px solid "+(newsFilter===c?C.accent:C.border),fontSize:11,fontWeight:600,cursor:"pointer"}},c)})
      ),
      filteredNews.map(function(n,i){
        return e("div",{key:i,style:Object.assign({},cardS,{padding:"12px 14px",display:"flex",gap:10,alignItems:"center",borderLeft:"3px solid "+(n.impact==="positive"?C.up:n.impact==="negative"?C.down:C.flat)})},
          e("div",{style:{minWidth:50,textAlign:"center"}},e("div",{style:{fontSize:12,fontFamily:MONO,color:C.textMuted}},n.time),e(Pill,{color:n.cat==="個股"?C.accent:n.cat==="AI"?C.purple:n.cat==="總經"?C.blue:n.cat==="國際"?C.orange:C.textMuted},n.cat)),
          e("div",{style:{flex:1}},e("div",{style:{fontSize:13,fontWeight:600,marginBottom:4}},n.title),e("div",{style:{display:"flex",gap:4,alignItems:"center"}},e("span",{style:{fontSize:10,color:C.textMuted}},n.source),n.tags.map(function(t){return e("span",{key:t,style:{fontSize:9,padding:"1px 5px",borderRadius:3,background:C.blue+"15",color:C.blue}},"#"+t)}))),
          e("div",{style:{display:"flex",gap:2,flexShrink:0}},Array.from({length:5}).map(function(_,j){return e("div",{key:j,style:{width:5,height:5,borderRadius:"50%",background:j<n.importance?C.gold:C.border}})}))
        )
      })
    ),

    // ── AI ADVISOR ──
    tab==="advisor"&&e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
      e("div",{style:Object.assign({},cardS,{padding:20,background:"linear-gradient(135deg,"+C.card+","+C.surface+")"})},
        e("h2",{style:{margin:"0 0 14px",fontSize:17,fontWeight:800}},"🤖 AI 投資策略日報 — "+new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"})),
        e("div",{style:{background:C.surface,borderRadius:10,padding:16,fontSize:13,lineHeight:1.9,color:C.textDim}},
          e("p",{style:{margin:"0 0 10px"}},e("strong",{style:{color:C.accent}},"【大盤研判・偏多】"),"加權指數站穩所有短中期均線，量能擴增至3,856億顯示買氣回籠。外資連3日買超累計逾600億，聚焦半導體與AI族群。費半指數隔夜大漲1.35%創歷史新高。"),
          e("p",{style:{margin:"0 0 10px"}},e("strong",{style:{color:C.warn}},"【關鍵變數】"),"①Fed 6月降息機率升至72%，資金面利多。②新台幣升值至30.85，出口族群匯損需留意。③DRAM現貨價持續走跌，記憶體族群承壓。"),
          e("p",{style:{margin:0}},e("strong",{style:{color:C.blue}},"【操作策略】"),"長線加碼AI伺服器鏈（廣達、緯穎、世芯），台積電逢千元以下布局。短線留意今日掛牌宏聯光電蜜月行情。金融股兆豐金殖利率5.5%適合存股。")
        )
      ),
      // Strategy groups
      [{t:"📈 長線價值（6-12月）",c:C.accent,f:function(s){return s.strategy==="長線價值"&&s.rating>=80}},{t:"⚡ 短線波段（1-4週）",c:C.warn,f:function(s){return(s.strategy==="波段操作"||s.strategy==="短線動能")&&s.rating>=60}},{t:"💰 存股標的（長期持有）",c:C.blue,f:function(s){return s.strategy==="存股標的"}}].map(function(cat,ci){
        var list=allStocks.filter(cat.f).sort(function(a,b){return b.rating-a.rating});
        return e("div",{key:ci},
          e("h3",{style:{margin:"0 0 10px",fontSize:14,fontWeight:700,color:cat.c}},cat.t),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(310px,1fr))",gap:10}},
            list.map(function(s){return e("div",{key:s.id,onClick:function(){setSel(s);setTab("stocks")},style:Object.assign({},cardS,{padding:14,cursor:"pointer",border:"1px solid "+cat.c+"22"})},
              e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8}},
                e("div",null,e("div",{style:{fontSize:14,fontWeight:800}},s.name," ",e("span",{style:{fontSize:11,color:C.textMuted,fontFamily:MONO}},s.id)),e("div",{style:{marginTop:3}},e(Pill,{color:C.purple},s.sector))),
                e(Badge,{score:s.rating})
              ),
              e("div",{style:{fontSize:11,color:C.textDim,marginBottom:8,lineHeight:1.6}},s.news),
              e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
                s.long_target&&e(Pill,{color:cat.c},"目標 $"+s.long_target+" (+"+((s.long_target-s.price)/s.price*100).toFixed(1)+"%)"),
                e(Pill,{color:C.danger},"停損 $"+s.stop_loss),
                s.dividend_yield>4&&e(Pill,{color:C.gold},"殖利率 "+s.dividend_yield+"%")
              )
            )})
          )
        )
      }),
      e("div",{style:{background:C.dangerDim,borderRadius:10,padding:14,border:"1px solid "+C.danger+"22"}},
        e("div",{style:{fontSize:12,fontWeight:700,color:C.danger,marginBottom:4}},"⚠️ 投資風險警語"),
        e("p",{style:{margin:0,fontSize:11,color:C.textDim,lineHeight:1.7}},"本系統提供之投資建議僅供參考，不構成投資邀約或獲利保證。AI評分依據公開財務數據、法人籌碼、技術指標及產業趨勢綜合計算。投資人應自行評估風險，審慎決策。")
      )
    )
  ),

  // FOOTER
  e("footer",{style:{padding:"14px 20px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}},
    e("span",{style:{fontSize:9,color:C.textMuted}},"台股日監測 Agent Pro v2.0 · TWSE / TPEx / MOPS / FinMind"),
    e("span",{style:{fontSize:9,color:C.textMuted}},"⚠️ 資訊僅供參考 · 投資有風險")
  )
)
}

// ═══ MOUNT ═══
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
