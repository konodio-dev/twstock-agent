<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台美股日監測 Agent Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#060b14;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0d1420}
::-webkit-scrollbar-thumb{background:#2a4060;border-radius:3px}
::selection{background:rgba(0,229,176,0.3);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.loading-dot{animation:pulse 1.5s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useMemo=React.useMemo;
var C={bg:"#060b14",surface:"#0d1420",card:"#131c2e",cardHover:"#182438",border:"#1e2d45",accent:"#00e5b0",accentDim:"rgba(0,229,176,0.12)",warn:"#fbbf24",warnDim:"rgba(251,191,36,0.12)",danger:"#f43f5e",dangerDim:"rgba(244,63,94,0.12)",up:"#00e5b0",down:"#f43f5e",flat:"#64748b",text:"#e8edf5",textDim:"#8b9ab8",textMuted:"#4a5a78",gold:"#fbbf24",purple:"#a78bfa",blue:"#38bdf8",orange:"#fb923c"};
var F="'Noto Sans TC',system-ui,sans-serif",M="'JetBrains Mono',monospace";
var cS={background:C.card,borderRadius:14,border:"1px solid "+C.border,overflow:"hidden"};

// ══════════════════════════════════════
// DATA URL — 你的 GitHub Pages JSON
// ══════════════════════════════════════
var DATA_URL="https://konodio-dev.github.io/twstock-agent/frontend/data/latest.json";

// ── Helpers ──
function Pill(p){return e("span",{style:{fontSize:10,padding:"2px 7px",borderRadius:4,background:(p.color||C.blue)+"18",color:p.color||C.blue,fontWeight:600,whiteSpace:"nowrap"}},p.children)}
function fmtVol(v){if(!v)return"-";if(v>=1e8)return(v/1e8).toFixed(1)+"億";if(v>=1e4)return(v/1e4).toFixed(0)+"萬";return v+""}
function fmtP(v){var n=parseFloat(v);return(n>=0?"+":"")+n+"%"}
function pColor(v){var n=parseFloat(v);return n>0?C.up:n<0?C.down:C.flat}

// ══════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════
function App(){
var _t=useState("tw"),tab=_t[0],setTab=_t[1];
var _d=useState(null),data=_d[0],setData=_d[1];
var _err=useState(null),err=_err[0],setErr=_err[1];
var _loading=useState(true),loading=_loading[0],setLoading=_loading[1];
var _sel=useState(null),sel=_sel[0],setSel=_sel[1];
var _usel=useState(null),usel=_usel[0],setUsel=_usel[1];
var _search=useState(""),search=_search[0],setSearch=_search[1];
var _usearch=useState(""),usearch=_usearch[0],setUsearch=_usearch[1];

// ── Fetch real data on load ──
useEffect(function(){
  setLoading(true);
  fetch(DATA_URL).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    return r.json();
  }).then(function(json){
    setData(json);
    setLoading(false);
  }).catch(function(e){
    console.error("Fetch error:",e);
    setErr("尚未產生資料，請先到 GitHub Actions 手動執行一次更新");
    setLoading(false);
  });
},[]);

var tabs=[{k:"tw",l:"🇹🇼 台股監測"},{k:"ipo",l:"🎫 IPO抽籤"},{k:"us",l:"🇺🇸 美股監測"},{k:"link",l:"🔗 台美連動"}];

// ── Parse data ──
var twList=[],usList=[],ipoList=[],alerts=[],usIdx=[],genTime="";
if(data){
  genTime=data.generated||"";
  // TW stocks - support both v2 "stocks" and v3 "tw_stocks"
  var rawTW=data.tw_stocks||data.stocks||{};
  if(rawTW){
    twList=Object.values(rawTW).filter(function(s){return s.name&&s.price>0});
    twList.forEach(function(s){
      s.changeP=s.changeP||"0.00";
      s.vol_str=fmtVol(s.volume);
      var net=(s.foreign_buy||0)+(s.trust_buy||0)+(s.dealer_buy||0);
      s.net_inst=net;
    });
    twList.sort(function(a,b){return(b.volume||0)-(a.volume||0)});
  }
  // US stocks
  if(data.us_stocks){
    usList=Object.values(data.us_stocks);
    usList.forEach(function(s){s.changeP=s.changeP||"0.00"});
    usList.sort(function(a,b){return Math.abs(parseFloat(b.changeP))-Math.abs(parseFloat(a.changeP))});
  }
  // US indices
  if(data.us_indices){usIdx=Object.values(data.us_indices)}
  // IPO
  if(data.ipo){ipoList=data.ipo}
  // Correlation
  if(data.correlation_alerts){alerts=data.correlation_alerts}
}

var filteredTW=twList.filter(function(s){return!search||s.name.indexOf(search)>=0||s.id.indexOf(search)>=0});
var filteredUS=usList.filter(function(s){return!usearch||s.name.indexOf(usearch)>=0||s.id.toUpperCase().indexOf(usearch.toUpperCase())>=0});

// ══ RENDER ══
return e("div",{style:{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:F}},

  // HEADER
  e("header",{style:{background:"linear-gradient(180deg,#0d1525,#060b14)",borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10}},
      e("div",{style:{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,"+C.accent+","+C.blue+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#000"}},"台美"),
      e("div",null,
        e("h1",{style:{margin:0,fontSize:18,fontWeight:800,background:"linear-gradient(90deg,"+C.accent+","+C.blue+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"台美股日監測 Agent Pro"),
        e("p",{style:{margin:0,fontSize:10,color:C.textMuted}},"TWSE · TPEx · NYSE · NASDAQ · 100% 真實數據"))
    ),
    e("div",{style:{display:"flex",alignItems:"center",gap:8}},
      genTime&&e("span",{style:{fontSize:10,color:C.textMuted,fontFamily:M}},"資料更新："+new Date(genTime).toLocaleString("zh-TW")),
      e("div",{style:{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",background:C.surface,borderRadius:6,border:"1px solid "+C.border}},
        e("div",{style:{width:7,height:7,borderRadius:"50%",background:data?C.accent:C.warn,boxShadow:"0 0 6px "+(data?C.accent:C.warn)}}),
        e("span",{style:{fontSize:10,color:C.textDim}},data?"LIVE":"LOADING")
      )
    )
  ),

  // NAV
  e("nav",{style:{display:"flex",padding:"0 20px",background:C.surface,borderBottom:"1px solid "+C.border,overflowX:"auto"}},
    tabs.map(function(t){return e("button",{key:t.k,onClick:function(){setTab(t.k)},style:{padding:"11px 16px",border:"none",cursor:"pointer",background:"transparent",color:tab===t.k?C.accent:C.textMuted,borderBottom:tab===t.k?"2px solid "+C.accent:"2px solid transparent",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}},t.l)})
  ),

  // MAIN
  e("main",{style:{padding:"16px 20px",maxWidth:1440,margin:"0 auto"}},

    // Loading state
    loading&&e("div",{style:{textAlign:"center",padding:"80px 20px"}},
      e("div",{className:"loading-dot",style:{fontSize:48,marginBottom:16}},"📊"),
      e("div",{style:{fontSize:16,fontWeight:700,color:C.accent}},"正在載入即時資料..."),
      e("div",{style:{fontSize:12,color:C.textMuted,marginTop:8}},"從 TWSE / TPEx / Yahoo Finance 抓取中")
    ),

    // Error state
    !loading&&err&&e("div",{style:{textAlign:"center",padding:"80px 20px"}},
      e("div",{style:{fontSize:48,marginBottom:16}},"⏳"),
      e("div",{style:{fontSize:16,fontWeight:700,color:C.warn}},err),
      e("div",{style:{fontSize:12,color:C.textDim,marginTop:8,lineHeight:1.8}},"請到 GitHub repo → Actions → 台股美股資料每日更新 → Run workflow",e("br",null),"執行一次後，資料就會自動產生並顯示在這裡")
    ),

    // ══ TW STOCKS ══
    !loading&&data&&tab==="tw"&&e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      // Search
      e("div",{style:{display:"flex",alignItems:"center",gap:8}},
        e("div",{style:{display:"flex",alignItems:"center",gap:6,background:C.card,borderRadius:8,padding:"7px 10px",border:"1px solid "+C.border,flex:"1 1 200px",maxWidth:280}},
          e("span",{style:{color:C.textMuted}},"🔍"),
          e("input",{value:search,onChange:function(ev){setSearch(ev.target.value)},placeholder:"搜尋台股代號或名稱...",style:{border:"none",background:"transparent",color:C.text,outline:"none",fontSize:12,width:"100%"}})
        ),
        e("span",{style:{fontSize:11,color:C.textMuted}},"共 "+filteredTW.length+" 檔")
      ),
      // Detail
      sel&&e("div",{style:Object.assign({},cS,{padding:0,border:"1px solid "+C.accent+"33"})},
        e("div",{style:{padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"start",borderBottom:"1px solid "+C.border,flexWrap:"wrap",gap:12}},
          e("div",null,
            e("h2",{style:{margin:0,fontSize:20,fontWeight:800}},sel.name,e("span",{style:{fontSize:12,color:C.textMuted,marginLeft:8,fontFamily:M}},sel.id)),
            e("div",{style:{display:"flex",gap:6,marginTop:4}},e(Pill,{color:C.blue},sel.market==="tse"?"上市":"上櫃"))
          ),
          e("button",{onClick:function(){setSel(null)},style:{background:"transparent",border:"1px solid "+C.border,borderRadius:7,padding:"5px 10px",color:C.textDim,cursor:"pointer",fontSize:11}},"✕")
        ),
        e("div",{style:{padding:"12px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}},
          [{l:"現價",v:"$"+sel.price,c:pColor(sel.changeP)},{l:"漲跌幅",v:fmtP(sel.changeP),c:pColor(sel.changeP)},{l:"開盤",v:"$"+(sel.open||"-")},{l:"最高",v:"$"+(sel.high||"-")},{l:"最低",v:"$"+(sel.low||"-")},{l:"成交量",v:sel.vol_str},{l:"本益比",v:sel.pe?sel.pe.toFixed(1):"N/A"},{l:"殖利率",v:sel.dividend_yield?sel.dividend_yield+"%":"N/A"},{l:"股價淨值比",v:sel.pb?sel.pb.toFixed(2):"N/A"}].map(function(m,i){
            return e("div",{key:i,style:{background:C.surface,borderRadius:8,padding:8}},
              e("div",{style:{fontSize:9,color:C.textMuted}},m.l),
              e("div",{style:{fontSize:15,fontWeight:800,color:m.c||C.text,fontFamily:M}},m.v))
          })
        ),
        // Institutional
        (sel.foreign_buy||sel.trust_buy||sel.dealer_buy)&&e("div",{style:{padding:"0 20px 16px"}},
          e("div",{style:{background:C.surface,borderRadius:8,padding:12}},
            e("div",{style:{fontSize:11,fontWeight:700,marginBottom:6}},"法人買賣超（張）"),
            e("div",{style:{display:"flex",gap:16}},
              [{l:"外資",v:sel.foreign_buy},{l:"投信",v:sel.trust_buy},{l:"自營商",v:sel.dealer_buy}].map(function(f,i){
                return e("span",{key:i,style:{fontSize:12}},
                  e("span",{style:{color:C.textMuted}},f.l+" "),
                  e("span",{style:{fontFamily:M,fontWeight:700,color:f.v>0?C.up:f.v<0?C.down:C.flat}},(f.v>0?"+":"")+f.v)
                )
              })
            )
          )
        )
      ),
      // Table
      e("div",{style:{overflowX:"auto"}},
        e("table",{style:{width:"100%",borderCollapse:"separate",borderSpacing:"0 4px"}},
          e("thead",null,e("tr",null,["代號","名稱","現價","漲跌%","成交量","本益比","殖利率","外資","投信","自營商"].map(function(h){return e("th",{key:h,style:{padding:"6px 8px",fontSize:10,color:C.textMuted,fontWeight:600,textAlign:"left"}},h)}))),
          e("tbody",null,filteredTW.slice(0,100).map(function(s){
            return e("tr",{key:s.id,onClick:function(){setSel(s)},style:{cursor:"pointer"},
              onMouseEnter:function(ev){ev.currentTarget.style.background=C.cardHover},
              onMouseLeave:function(ev){ev.currentTarget.style.background=C.card}},
              e("td",{style:{padding:8,background:C.card,borderRadius:"8px 0 0 8px",fontFamily:M,fontSize:12,fontWeight:700}},s.id),
              e("td",{style:{padding:8,background:C.card,fontWeight:700,fontSize:12}},s.name),
              e("td",{style:{padding:8,background:C.card,fontFamily:M,fontWeight:800}},"$"+s.price),
              e("td",{style:{padding:8,background:C.card,color:pColor(s.changeP),fontFamily:M,fontWeight:700,fontSize:12}},fmtP(s.changeP)),
              e("td",{style:{padding:8,background:C.card,fontSize:11,color:C.textDim}},s.vol_str),
              e("td",{style:{padding:8,background:C.card,fontSize:11,fontFamily:M}},s.pe?s.pe.toFixed(1):"-"),
              e("td",{style:{padding:8,background:C.card,fontSize:11,fontFamily:M,color:s.dividend_yield>4?C.gold:C.text}},s.dividend_yield?s.dividend_yield+"%":"-"),
              e("td",{style:{padding:8,background:C.card,fontSize:11,fontFamily:M,color:s.foreign_buy>0?C.up:s.foreign_buy<0?C.down:C.flat}},s.foreign_buy||"-"),
              e("td",{style:{padding:8,background:C.card,fontSize:11,fontFamily:M,color:s.trust_buy>0?C.up:s.trust_buy<0?C.down:C.flat}},s.trust_buy||"-"),
              e("td",{style:{padding:8,background:C.card,borderRadius:"0 8px 8px 0",fontSize:11,fontFamily:M,color:s.dealer_buy>0?C.up:s.dealer_buy<0?C.down:C.flat}},s.dealer_buy||"-")
            )
          }))
        )
      )
    ),

    // ══ IPO ══
    !loading&&data&&tab==="ipo"&&e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      e("div",{style:Object.assign({},cS,{padding:16,background:"linear-gradient(135deg,"+C.accentDim+","+C.surface+")",border:"1px solid "+C.accent+"33"})},
        e("h3",{style:{margin:"0 0 6px",fontSize:15,fontWeight:700}},"🎫 公開申購 / 新股抽籤追蹤"),
        e("p",{style:{margin:0,fontSize:12,color:C.textDim}},"資料來源：撿股讚 (wespai.com)，每日自動更新真實申購資訊")
      ),
      ipoList.length===0&&e("div",{style:Object.assign({},cS,{padding:30,textAlign:"center"})},
        e("div",{style:{fontSize:14,color:C.textDim}},"目前無 IPO 申購資料，請先執行一次 Actions 更新")
      ),
      ipoList.map(function(ipo,i){
        var isProfit=ipo.return_rate>0;
        return e("div",{key:i,style:Object.assign({},cS,{padding:16,borderLeft:"4px solid "+(isProfit?C.up:ipo.return_rate<0?C.down:C.flat)})},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"start",flexWrap:"wrap",gap:12}},
            e("div",{style:{flex:1}},
              e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}},
                e("span",{style:{fontSize:16,fontWeight:800}},ipo.name),
                e("span",{style:{fontSize:12,color:C.textMuted,fontFamily:M}},ipo.id),
                e(Pill,{color:C.blue},ipo.market_type),
                e(Pill,{color:ipo.status==="申購中"?C.accent:ipo.status==="即將申購"?C.warn:ipo.status==="等待抽籤"?C.purple:C.textMuted},ipo.status)
              ),
              e("div",{style:{display:"flex",gap:12,flexWrap:"wrap",fontSize:11,color:C.textMuted}},
                e("span",null,"承銷價 ",e("strong",{style:{color:C.text}},"$"+ipo.offer_price)),
                e("span",null,"收盤價 ",e("strong",{style:{color:C.text}},"$"+ipo.close_price)),
                e("span",null,"報酬率 ",e("strong",{style:{color:isProfit?C.up:C.down}},(isProfit?"+":"")+ipo.return_rate+"%")),
                e("span",null,"賺賠 ",e("strong",{style:{color:isProfit?C.up:C.down}},(isProfit?"+":"")+ipo.profit_loss.toLocaleString()+"元")),
                e("span",null,"抽籤日 ",e("strong",{style:{color:C.text}},ipo.draw_date)),
                ipo.win_rate>0&&e("span",null,"中籤率 ",e("strong",{style:{color:C.text}},ipo.win_rate+"%")),
                e("span",null,"需準備 ",e("strong",{style:{color:C.text}},"$"+ipo.need_money.toLocaleString()))
              )
            ),
            e("div",{style:{textAlign:"right",minWidth:70}},
              e("div",{style:{fontSize:24,fontWeight:900,fontFamily:M,color:isProfit?C.up:ipo.return_rate<0?C.down:C.flat}},(isProfit?"+":"")+ipo.return_rate+"%"),
              e("div",{style:{fontSize:10,color:C.textMuted}},"報酬率")
            )
          )
        )
      })
    ),

    // ══ US STOCKS ══
    !loading&&data&&tab==="us"&&e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      // Indices
      usIdx.length>0&&e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8}},
        usIdx.map(function(idx,i){var cp=parseFloat(idx.changeP);return e("div",{key:i,style:Object.assign({},cS,{padding:12})},
          e("div",{style:{fontSize:10,color:C.textMuted,marginBottom:3}},idx.name),
          e("div",{style:{fontSize:18,fontWeight:800,fontFamily:M}},idx.price.toLocaleString()),
          e("div",{style:{fontSize:11,fontWeight:700,color:cp>=0?C.up:C.down,fontFamily:M}},fmtP(idx.changeP)))
        })
      ),
      // Search
      e("div",{style:{display:"flex",alignItems:"center",gap:8}},
        e("div",{style:{display:"flex",alignItems:"center",gap:6,background:C.card,borderRadius:8,padding:"7px 10px",border:"1px solid "+C.border,flex:"1 1 200px",maxWidth:280}},
          e("span",{style:{color:C.textMuted}},"🔍"),
          e("input",{value:usearch,onChange:function(ev){setUsearch(ev.target.value)},placeholder:"搜尋美股 (NVDA, Apple)...",style:{border:"none",background:"transparent",color:C.text,outline:"none",fontSize:12,width:"100%"}})
        ),
        e("span",{style:{fontSize:11,color:C.textMuted}},"共 "+filteredUS.length+" 檔")
      ),
      // Detail
      usel&&e("div",{style:Object.assign({},cS,{padding:0,border:"1px solid "+C.blue+"33"})},
        e("div",{style:{padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"start",borderBottom:"1px solid "+C.border,flexWrap:"wrap",gap:12}},
          e("div",null,
            e("h2",{style:{margin:0,fontSize:20,fontWeight:800}},usel.name||usel.name_en,e("span",{style:{fontSize:14,color:C.textMuted,marginLeft:8,fontFamily:M}},usel.id)),
            e("div",{style:{display:"flex",gap:6,marginTop:4}},usel.sector&&e(Pill,{color:C.purple},usel.sector),e(Pill,{color:C.blue},"USD"))
          ),
          e("button",{onClick:function(){setUsel(null)},style:{background:"transparent",border:"1px solid "+C.border,borderRadius:7,padding:"5px 10px",color:C.textDim,cursor:"pointer",fontSize:11}},"✕")
        ),
        e("div",{style:{padding:"12px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}},
          [{l:"現價(USD)",v:"$"+usel.price,c:pColor(usel.changeP)},{l:"漲跌",v:fmtP(usel.changeP),c:pColor(usel.changeP)},{l:"市值",v:usel.marketCap?(usel.marketCap>=1e12?"$"+(usel.marketCap/1e12).toFixed(2)+"T":"$"+(usel.marketCap/1e9).toFixed(0)+"B"):"-"},{l:"52W高",v:usel.fiftyTwoWeekHigh?"$"+usel.fiftyTwoWeekHigh:"-"},{l:"52W低",v:usel.fiftyTwoWeekLow?"$"+usel.fiftyTwoWeekLow:"-"}].map(function(m,i){
            return e("div",{key:i,style:{background:C.surface,borderRadius:8,padding:10}},
              e("div",{style:{fontSize:9,color:C.textMuted}},m.l),
              e("div",{style:{fontSize:16,fontWeight:800,color:m.c||C.text,fontFamily:M}},m.v))
          })
        ),
        usel.tw_related&&usel.tw_related.length>0&&e("div",{style:{padding:"0 20px 16px"}},
          e("div",{style:{background:C.surface,borderRadius:8,padding:12}},
            e("div",{style:{fontSize:11,fontWeight:700,color:C.orange,marginBottom:6}},"🔗 台股供應鏈"),
            e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},usel.tw_related.map(function(tid){
              return e("span",{key:tid,onClick:function(){var tw=twList.find(function(s){return s.id===tid});if(tw){setSel(tw);setTab("tw")}},
                style:{padding:"4px 10px",borderRadius:6,background:C.accentDim,border:"1px solid "+C.accent+"33",color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer"}},tid)
            }))
          )
        )
      ),
      // Table
      e("div",{style:{overflowX:"auto"}},
        e("table",{style:{width:"100%",borderCollapse:"separate",borderSpacing:"0 4px"}},
          e("thead",null,e("tr",null,["代號","名稱","產業","現價(USD)","漲跌%","成交量","台股連動"].map(function(h){return e("th",{key:h,style:{padding:"6px 8px",fontSize:10,color:C.textMuted,fontWeight:600,textAlign:"left"}},h)}))),
          e("tbody",null,filteredUS.map(function(s){var cp=parseFloat(s.changeP);return e("tr",{key:s.id,onClick:function(){setUsel(s)},style:{cursor:"pointer"},
            onMouseEnter:function(ev){ev.currentTarget.style.background=C.cardHover},
            onMouseLeave:function(ev){ev.currentTarget.style.background=C.card}},
            e("td",{style:{padding:8,background:C.card,borderRadius:"8px 0 0 8px",fontFamily:M,fontSize:13,fontWeight:800,color:C.blue}},s.id),
            e("td",{style:{padding:8,background:C.card,fontWeight:700,fontSize:12}},s.name||s.name_en||s.id),
            e("td",{style:{padding:8,background:C.card}},s.sector?e(Pill,{color:C.purple},s.sector):"-"),
            e("td",{style:{padding:8,background:C.card,fontFamily:M,fontWeight:800,fontSize:14}},"$"+s.price),
            e("td",{style:{padding:8,background:C.card,color:cp>=0?C.up:C.down,fontFamily:M,fontWeight:700,fontSize:12}},fmtP(s.changeP)),
            e("td",{style:{padding:8,background:C.card,fontSize:11,color:C.textDim}},s.volume?fmtVol(s.volume):"-"),
            e("td",{style:{padding:8,background:C.card,borderRadius:"0 8px 8px 0"}},s.tw_related&&s.tw_related.length>0?e("span",{style:{fontSize:10,color:C.orange}},s.tw_related.join(", ")):"-")
          )}))
        )
      )
    ),

    // ══ CORRELATION ══
    !loading&&data&&tab==="link"&&e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      e("div",{style:Object.assign({},cS,{padding:16,background:"linear-gradient(135deg,"+C.orange+"11,"+C.surface+")",border:"1px solid "+C.orange+"33"})},
        e("h3",{style:{margin:"0 0 6px",fontSize:15,fontWeight:700}},"🔗 台美供應鏈連動分析"),
        e("p",{style:{margin:0,fontSize:12,color:C.textDim}},"美股龍頭波動超過 2% 時，自動提示相關台股供應鏈標的")
      ),
      alerts.length===0?e("div",{style:Object.assign({},cS,{padding:20,textAlign:"center"})},
        e("div",{style:{fontSize:40,marginBottom:8}},"✅"),
        e("div",{style:{fontSize:14,color:C.textDim}},"今日美股無重大波動（< 2%），暫無連動警報")
      ):
      alerts.map(function(a,i){var cp=parseFloat(a.cp||a.us_changeP||0);return e("div",{key:i,style:Object.assign({},cS,{padding:16,borderLeft:"4px solid "+(cp>0?C.up:C.down)})},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            e("span",{style:{fontSize:22}},cp>0?"📈":"📉"),
            e("span",{style:{fontSize:16,fontWeight:800}},a.name||a.us_name||""),
            e("span",{style:{fontSize:14,color:C.textMuted,fontFamily:M}},a.us||a.us_symbol||"")
          ),
          e("span",{style:{fontSize:20,fontWeight:900,fontFamily:M,color:cp>0?C.up:C.down}},(cp>0?"+":"")+cp.toFixed(2)+"%")
        ),
        e("div",{style:{fontSize:13,color:C.textDim,marginBottom:10}},a.msg||a.message||""),
        (a.tw||a.tw_related)&&e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          (a.tw||a.tw_related||[]).map(function(tid){return e("span",{key:tid,onClick:function(){var tw=twList.find(function(s){return s.id===tid});if(tw){setSel(tw);setTab("tw")}},
            style:{padding:"5px 12px",borderRadius:8,background:cp>0?C.accentDim:C.dangerDim,border:"1px solid "+(cp>0?C.accent:C.danger)+"33",color:cp>0?C.accent:C.danger,fontSize:12,fontWeight:700,cursor:"pointer"}},tid)
          })
        )
      )})
    )
  ),

  // FOOTER
  e("footer",{style:{padding:"14px 20px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}},
    e("span",{style:{fontSize:9,color:C.textMuted}},"台美股日監測 Agent v3.1 · 100% 真實數據 · TWSE / TPEx / Yahoo Finance / wespai.com"),
    e("span",{style:{fontSize:9,color:C.textMuted}},"⚠️ 資訊僅供參考 · 投資有風險")
  )
)
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
