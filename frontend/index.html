function App(){

},[]);

        e("div",{style:{fontSize:14,color:C.textDim}},"今日美股無重大波動（< 2%），暫無連動警報")
      ):
      alerts.map(function(a,i){var cp=parseFloat(a.us_changeP||0);return e("div",{key:i,style:Object.assign({},cS,{padding:16,borderLeft:"4px solid "+(cp>0?C.up:C.down)})},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            e("span",{style:{fontSize:22}},cp>0?"📈":"📉"),
            e("span",{style:{fontSize:16,fontWeight:800}},a.us_name||""),
            e("span",{style:{fontSize:14,color:C.textMuted,fontFamily:M}},a.us_symbol||"")
          ),
          e("span",{style:{fontSize:20,fontWeight:900,fontFamily:M,color:cp>0?C.up:C.down}},(cp>0?"+":"")+cp.toFixed(2)+"%")
        ),
        e("div",{style:{fontSize:13,color:C.textDim,marginBottom:10}},a.message||""),
        a.tw_related&&e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          a.tw_related.map(function(tid){return e("span",{key:tid,onClick:function(){var tw=twList.find(function(s){return s.id===tid});if(tw){setSel(tw);setTab("tw")}},
            style:{padding:"5px 12px",borderRadius:8,background:cp>0?C.accentDim:C.dangerDim,border:"1px solid "+(cp>0?C.accent:C.danger)+"33",color:cp>0?C.accent:C.danger,fontSize:12,fontWeight:700,cursor:"pointer"}},tid)
          })
        )
      )})
    )
  ),

  // FOOTER
  e("footer",{style:{padding:"14px 20px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}},
    e("span",{style:{fontSize:9,color:C.textMuted}},"台美股日監測 Agent Pro v5.0 · 多因子 AI 分析 · TWSE / TPEx / FinMind / Yahoo Finance"),
    e("span",{style:{fontSize:9,color:C.textMuted}},"⚠️ 資訊僅供參考 · 投資有風險")
  )
)
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
